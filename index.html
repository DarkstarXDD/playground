<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Playground</title>
    <link rel="stylesheet" href="styles.css" />
    <script src="main.js" defer></script>
  </head>

  <body>
    <main>
      <form class="form">
        <fieldset class="fieldset">
          <legend class="visually-hidden">Ratings</legend>
          <div class="wrapper">
            <input
              type="radio"
              name="rating"
              value="1"
              id="radio-1"
              class="radio-button"
            />
            <label for="radio-1" class="visually-hidden">1</label>
          </div>
          <div class="wrapper">
            <input
              type="radio"
              name="rating"
              value="2"
              id="radio-2"
              class="radio-button"
            />
            <label for="radio-2" class="visually-hidden">2</label>
          </div>
          <div class="wrapper">
            <input
              type="radio"
              name="rating"
              value="3"
              id="radio-3"
              class="radio-button"
            />
            <label for="radio-3" class="visually-hidden">3</label>
          </div>
          <div class="wrapper">
            <input
              type="radio"
              name="rating"
              value="4"
              id="radio-4"
              class="radio-button"
            />
            <label for="radio-4" class="visually-hidden">4</label>
          </div>
          <div class="wrapper">
            <input
              type="radio"
              name="rating"
              value="5"
              id="radio-5"
              class="radio-button"
            />
            <label for="radio-5" class="visually-hidden">5</label>
          </div>
        </fieldset>
        <button class="submit-button">Submit</button>
      </form>
    </main>
  </body>
</html>
